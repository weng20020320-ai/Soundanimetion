<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Wavelet — a desktop tool that turns audio into a moving image. Web preview demo."
    />
    <title>Wavelet · audio visualizer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #0b0d12;
        overflow: hidden;
      }
      #splash {
        position: fixed;
        inset: 0;
        background: #0b0d12;
        color: #e6e9ef;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
        z-index: 9999;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: opacity 420ms ease;
        opacity: 1;
      }
      #splash.fading {
        opacity: 0;
        pointer-events: none;
      }
      #splash .brand {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 4px;
        color: #e6e9ef;
        opacity: 0;
        animation: splashFadeIn 600ms ease 80ms forwards;
      }
      #splash .bars {
        display: flex;
        gap: 5px;
        align-items: flex-end;
        height: 44px;
      }
      #splash .bar {
        width: 5px;
        height: 6px;
        background: linear-gradient(180deg, #6aa9ff 0%, #5e9eff 100%);
        border-radius: 2px;
        transform-origin: bottom center;
        animation: splashBar 1s ease-in-out infinite alternate;
      }
      #splash .bar:nth-child(1) { animation-delay: 0ms;   }
      #splash .bar:nth-child(2) { animation-delay: 80ms;  }
      #splash .bar:nth-child(3) { animation-delay: 160ms; }
      #splash .bar:nth-child(4) { animation-delay: 240ms; }
      #splash .bar:nth-child(5) { animation-delay: 320ms; }
      #splash .bar:nth-child(6) { animation-delay: 400ms; }
      #splash .bar:nth-child(7) { animation-delay: 480ms; }
      #splash .hint {
        font-size: 11px;
        color: #8a93a4;
        letter-spacing: 1.5px;
        opacity: 0;
        animation: splashFadeIn 600ms ease 200ms forwards;
      }
      @keyframes splashBar {
        0%   { height: 6px;  opacity: 0.45; }
        100% { height: 44px; opacity: 1.0;  }
      }
      @keyframes splashFadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="brand">WAVELET</div>
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="hint">WEB DEMO</div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
